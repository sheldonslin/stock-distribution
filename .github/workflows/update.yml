name: 更新股票涨跌分布

on:
  schedule:
    # 交易日 9:30-15:00 每20分钟（UTC = 北京-8）
    # 北京 9:20 = UTC 1:20, 北京 15:20 = UTC 7:20
    # 周一到周五 UTC 1:00-7:59 每20分钟
    - cron: '*/20 1-7 * * 1-5'
  workflow_dispatch:  # 支持手动触发

# 给 GITHUB_TOKEN 写入权限，用于部署 GitHub Pages
permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取数据生成 JSON
        run: python scripts/fetch_stock.py

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

  # 防止 GitHub 因仓库不活跃而自动禁用 scheduled workflows
  # GitHub 策略：60天无push/PR活动会暂停cron调度，且不通知
  keepalive:
    runs-on: ubuntu-latest
    # 只在 schedule 触发时运行，手动触发不需要
    if: github.event_name == 'schedule'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Keep workflow alive
        uses: gautamkrishnar/keepalive-workflow@v2
